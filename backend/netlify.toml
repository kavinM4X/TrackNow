# Netlify — TrackNow API (serverless)
# New site → Base directory: backend → Publish: public

[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"
  NETLIFY = "true"
  # Public links (registration, driver portal) — must match your client Netlify site
  FRONTEND_CLIENT_URL = "https://tracknow-client.netlify.app"
  # PORT/NODE_ENV/BACKUP_DIR are not real secrets; scanner false-positives in docs/node_modules
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongoose", "mongodb", "bson"]

[functions.api]
  timeout = 10
  included_files = ["routes/**", "models/**", "utils/**", "middleware/**", "jobs/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/api"
  status = 200
  force = true
