# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New + Blueprint → connect GitHub repo
services:
  - type: web
    name: tracknow-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKUP_ENABLED
        value: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
