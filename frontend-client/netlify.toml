# Netlify — TrackNow Client (farmer app)
# Connect repo with Base directory: frontend-client

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # API on Vercel (backend only); or Netlify/Render URL if you still use those
  VITE_API_URL = "https://track-now-bay.vercel.app/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
